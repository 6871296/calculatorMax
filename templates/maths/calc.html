		<script type="module">
			import { Fireworks } from 'https://esm.run/fireworks-js';

			opacity: 0.4,

		<script type="module">
			async function calc(){
				let expression = document.getElementById("ev-input").value;
				if(expression==='')return;
				let calc_res;
				
				// 确保有通知权限（首次点击计算时请求）
				requestNotificationPermission();
				
				try {
					// 支持两种模式：pywebview 直接调用 和 HTTP API
					if (window.pywebview && window.pywebview.api && window.pywebview.api.calc) {
						let result = window.pywebview.api.calc(expression);
						// 处理 Promise 或直接返回值
						if (result && typeof result.then === 'function') {
							// Promise 解析后返回 {result, error} 对象，转换为数组
							let data = await result;
							calc_res = [data.result, data.error];
						} else if (result && result.result !== undefined) {
							// 已经是对象格式，转换为数组
							calc_res = [result.result, result.error];
						} else {
							// 处理其他格式，确保转换为数组 [result, error]
							if (Array.isArray(result)) {
								calc_res = result;
							} else if (typeof result === 'string') {
								// 可能是直接返回的结果字符串
								calc_res = [result, false];
							} else {
								calc_res = [String(result), false];
							}
						}
					} else {
						// HTTP 模式
						let response = await fetch('/api/maths/calc', {
							method: 'POST',
							headers: {'Content-Type': 'application/json'},
							body: JSON.stringify({expression: expression})
						});
						let data = await response.json();
						calc_res = [data.result, data.error];
					}
					status(true)
				} catch (e) {
					console.error(e);
					calc_res = ['计算错误: ' + e.message, true];
					status(false)
				}
				
				let res = calc_res[0];
				let err = calc_res[1];
				
				// 检查窗口是否被遮挡，如果是则发送通知
				if (windowState.isHidden()) {
					sendCalcNotification(expression, res, err);
				}
				
				if(err){
					document.getElementById("ev-res").style.display="inline";
					document.getElementById("ev-equal-sign").style.color="red";
					document.getElementById("ev-equal-sign").innerText="错误：";
					document.getElementById("res-btns").style.display="none";
					status(false);
					document.getElementById("ev-result").innerText=res;
					// 错误时只清空输入框，不清空结果区域
					document.getElementById("ev-input").value="";
				}else{
					resExists=true;
					document.getElementById("res-btns").style.display="block";
					document.getElementById("ev-res").style.display="inline";
					status(true);
					// 显示结果并检查是否需要截断
					displayResult(res);
					// 成功时清空输入框，保留结果显示
					document.getElementById("ev-input").value="";
				}
			}
		</script>
